  <path class="ln" d="M341 78 H375" marker-end="url(#ar)"/>
  <text class="lab" x="479" y="24" text-anchor="middle" style="fill:#f0616c">THE ACTION GAP</text>
  <rect class="b-gap" x="381" y="34" width="196" height="86" rx="13"/>
  <text class="t" x="479" y="64" text-anchor="middle">The action</text>
  <text class="tm" x="479" y="83" text-anchor="middle" style="fill:#f0616c">should this run?</text>
  <text class="block" x="479" y="105" text-anchor="middle" style="font-size:12.5px;font-weight:700">nobody decides this</text>
  <path class="ln" d="M577 78 H611" marker-end="url(#ar)"/>
  <rect class="b-mut" x="617" y="48" width="142" height="60" rx="12"/>
  <text class="t" x="688" y="74" text-anchor="middle">Runs</text>
